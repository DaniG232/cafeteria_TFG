<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plato - Admin</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
    <nav th:replace="~{fragments/layout :: navbar}"></nav>

    <main class="container">
        <div th:replace="~{fragments/layout :: mensajes}"></div>

        <h1 th:text="${plato.idPlato != null} ? 'Editar Plato' : 'Nuevo Plato'"></h1>

        <div class="card">
            <form th:action="${plato.idPlato != null}
                    ? @{'/admin/platos/' + ${plato.idPlato} + '/editar'}
                    : @{/admin/platos/nuevo}"
                  method="post" th:object="${plato}">

                <div class="form-group">
                    <label for="nombre">Nombre:</label>
                    <input type="text" id="nombre" th:field="*{nombre}" required
                           placeholder="Nombre del plato">
                </div>

                <div class="form-group">
                    <label for="descripcion">Descripcion:</label>
                    <textarea id="descripcion" th:field="*{descripcion}" rows="3"
                              placeholder="Descripcion del plato"></textarea>
                </div>

                <div class="form-group">
                    <label for="tipo">Tipo:</label>
                    <select id="tipo" th:field="*{tipo}" required>
                        <option value="">-- Selecciona tipo --</option>
                        <option th:each="t : ${tipos}" th:value="${t}" th:text="${t}"></option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="precio">Precio (EUR):</label>
                    <input type="number" id="precio" th:field="*{precio}" step="0.01" min="0" required
                           placeholder="0.00">
                </div>

                <button type="submit" class="btn btn-primary">Guardar</button>
                <a href="/admin/platos" class="btn btn-secondary">Cancelar</a>
            </form>
        </div>
    </main>

    <footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
