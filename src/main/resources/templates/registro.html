<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Cafeteria Instituto</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <h2>&#128221; Registro</h2>

            <div th:replace="~{fragments/layout :: mensajes}"></div>

            <form method="post" th:action="@{/usuarios/registro}" th:object="${usuario}">
                <div class="form-group">
                    <label for="email">Email:</label>
                    <input type="email" id="email" th:field="*{email}" required
                           placeholder="tu@email.com">
                </div>
                <div class="form-group">
                    <label for="nombre">Nombre:</label>
                    <input type="text" id="nombre" th:field="*{nombre}" required
                           placeholder="Tu nombre completo">
                </div>
                <div class="form-group">
                    <label for="contrasena">Contrasena:</label>
                    <input type="password" id="contrasena" th:field="*{contrasena}" required
                           placeholder="Tu contrasena">
                </div>
                <div class="form-group">
                    <label for="rol">Rol:</label>
                    <select id="rol" th:field="*{rol}" required>
                        <option value="">-- Selecciona rol --</option>
                        <option th:each="r : ${roles}" th:value="${r}" th:text="${r}"></option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary btn-block">Registrarse</button>
            </form>

            <p class="auth-link">
                Ya tienes cuenta? <a href="/login">Inicia sesion</a>
            </p>
            <p class="auth-link">
                <a href="/">Volver al inicio</a>
            </p>
        </div>
    </div>
</body>
</html>
